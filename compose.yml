services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: aios_chromadb
    ports:
      - "8000:8000"
    volumes:
      # Bind mount — data lives at ./chroma_data inside your repo.
      # You can see it, back it up, or wipe it without touching Docker internals.
      - ./chroma_data:/chroma/chroma
    environment:
      # Disable telemetry
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped
